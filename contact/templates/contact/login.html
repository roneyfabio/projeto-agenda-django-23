{% extends 'global/base.html' %}

{% block content %}
  <div class="form-wrapper">

     {% if user.is_authenticated %}
      <p>
        Você fez login como {{ user.username}}.
        Clique <a href="{% url "contact:logout" %}">aqui</a>
        para sair
      </p>
     
     {% else %}    
      {% include "contact/partials/_user-form.html" %}
    {% endif %}

  </div>
{% endblock content %}
